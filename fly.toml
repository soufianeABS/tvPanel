# Rename app after `fly apps create <name>`
app = "tvplus-automation"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  # Keep a single machine handling requests; app itself runs one automation at a time.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 1
    hard_limit = 2

[[vm]]
  # Lowest practical size for Playwright Chromium stability on Fly.
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
