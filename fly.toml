# Rename app after `fly apps create <name>`
app = "tvplus-automation"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 2
